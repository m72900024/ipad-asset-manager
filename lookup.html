<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>未使用載具查詢工具</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, 'Noto Sans TC', sans-serif; }
    .result-row:hover { background: #f0f9ff; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
    .not-found { color: #ef4444; background: #fef2f2; }
    .found { color: #059669; background: #ecfdf5; }
    textarea { resize: vertical; }
    #group-view .cart-group { break-inside: avoid; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">
  <div class="max-w-5xl mx-auto">
    <header class="mb-6">
      <h1 class="text-2xl font-bold text-indigo-600 flex items-center gap-2">
        🔍 MDM 未使用載具查詢
      </h1>
      <p class="text-gray-500 text-sm mt-1">從 MDM 複製未使用載具清單，貼上後自動查詢充電車與班級位置</p>
      <a href="index.html" class="text-xs text-indigo-400 hover:underline">← 回主系統</a>
    </header>

    <div class="bg-white rounded-xl shadow p-6 mb-6">
      <label class="block text-sm font-semibold text-gray-700 mb-2">📋 貼上 MDM 未使用載具清單</label>
      <textarea id="mdm-input" rows="10" 
        class="w-full border border-gray-300 rounded-lg p-3 text-sm font-mono focus:ring-indigo-500 focus:border-indigo-500"
        placeholder="直接從 MDM 網站複製整欄資料貼上，例如：&#10;YG2022iPAD-001	2026/3/5 上午 09:33:00&#10;YZES_IPAD9_325	2026/2/24 下午 08:02:03&#10;..."></textarea>
      <div class="flex gap-3 mt-3">
        <button onclick="doLookup()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-6 rounded-lg transition">
          🔍 查詢位置
        </button>
        <button onclick="clearAll()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-2 px-4 rounded-lg transition">
          清除
        </button>
        <label class="flex items-center gap-2 text-sm text-gray-600 ml-auto">
          <input type="checkbox" id="toggle-view" onchange="toggleView()" class="rounded">
          依充電車分組顯示
        </label>
      </div>
    </div>

    <!-- 結果統計 -->
    <div id="stats" class="hidden mb-4 grid grid-cols-3 gap-3">
      <div class="bg-white rounded-lg shadow p-4 text-center">
        <p class="text-3xl font-bold text-gray-800" id="stat-total">0</p>
        <p class="text-xs text-gray-500 mt-1">總筆數</p>
      </div>
      <div class="bg-white rounded-lg shadow p-4 text-center">
        <p class="text-3xl font-bold text-emerald-600" id="stat-found">0</p>
        <p class="text-xs text-gray-500 mt-1">找到紀錄</p>
      </div>
      <div class="bg-white rounded-lg shadow p-4 text-center">
        <p class="text-3xl font-bold text-red-500" id="stat-notfound">0</p>
        <p class="text-xs text-gray-500 mt-1">查無紀錄（需手動確認）</p>
      </div>
    </div>

    <!-- 列表視圖 -->
    <div id="list-view" class="hidden bg-white rounded-xl shadow overflow-hidden mb-6">
      <div class="flex justify-between items-center p-4 border-b">
        <h2 class="font-semibold text-gray-700">查詢結果</h2>
        <button onclick="copyResult()" class="text-sm text-indigo-600 hover:underline">📋 複製結果</button>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 text-gray-600 text-xs uppercase">
            <tr>
              <th class="px-4 py-3 text-left">#</th>
              <th class="px-4 py-3 text-left">載具名稱</th>
              <th class="px-4 py-3 text-left">MDM 同步時間</th>
              <th class="px-4 py-3 text-left">充電車</th>
              <th class="px-4 py-3 text-left">班級</th>
              <th class="px-4 py-3 text-left">狀態</th>
            </tr>
          </thead>
          <tbody id="result-table" class="divide-y divide-gray-100"></tbody>
        </table>
      </div>
    </div>

    <!-- 分組視圖 -->
    <div id="group-view" class="hidden mb-6">
      <div id="group-content" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></div>
    </div>

    <!-- 資料說明 -->
    <div class="text-xs text-gray-400 text-center mt-4">
      資料來源：ipad-asset-manager 離線資料（含 438 筆）。YG2022 系列請至線上版 Firebase 確認。
    </div>
  </div>

  // 解析 MDM 清單
  function parseMDMInput(raw) {
    const lines = raw.trim().split('\n');
    const results = [];
    for (let line of lines) {
      line = line.trim();
      if (!line) continue;
      // 跳過標題列
      if (line.includes('未使用載具名稱') || line.includes('原生MDM')) continue;
      // 分割：tab 或多空格
      const parts = line.split(/\t|  +/);
      const name = parts[0]?.trim();
      const syncTime = parts.slice(1).join(' ').trim() || '-';
      if (name) results.push({ name, syncTime });
    }
    return results;
  }

  // 特殊設備規則
  function getSpecialInfo(name) {
    if (name.startsWith('YG2022iPAD')) {
      return { cart: '漁光分校', room: '漁光分校', special: true };
    }
    return null;
  }

  let lastResults = [];

  function doLookup() {
    const raw = document.getElementById('mdm-input').value;
    if (!raw.trim()) { alert('請先貼上 MDM 清單'); return; }

    const items = parseMDMInput(raw);
    if (!items.length) { alert('解析不到資料，請確認格式'); return; }

    lastResults = items.map((item, i) => {
      const special = getSpecialInfo(item.name);
      const info = special || IPAD_DATA[item.name];
      return {
        index: i + 1,
        name: item.name,
        syncTime: item.syncTime,
        cart: info?.cart || null,
        room: info?.room || null,
        found: !!info,
        special: !!special
      };
    });

    renderStats(lastResults);
    renderList(lastResults);
    renderGroups(lastResults);

    document.getElementById('stats').classList.remove('hidden');
    const isGroup = document.getElementById('toggle-view').checked;
    document.getElementById('list-view').classList.toggle('hidden', isGroup);
    document.getElementById('group-view').classList.toggle('hidden', !isGroup);
  }

  function renderStats(results) {
    const found = results.filter(r => r.found).length;
    document.getElementById('stat-total').textContent = results.length;
    document.getElementById('stat-found').textContent = found;
    document.getElementById('stat-notfound').textContent = results.length - found;
  }

  function renderList(results) {
    const tbody = document.getElementById('result-table');
    tbody.innerHTML = results.map(r => `
      <tr class="result-row ${r.found ? '' : 'bg-red-50/30'}">
        <td class="px-4 py-3 text-gray-400">${r.index}</td>
        <td class="px-4 py-3 font-mono font-semibold text-gray-800">${r.name}</td>
        <td class="px-4 py-3 text-gray-500 text-xs">${r.syncTime}</td>
        <td class="px-4 py-3 font-bold ${r.found ? 'text-indigo-600' : 'text-gray-300'}">${r.cart || '—'}</td>
        <td class="px-4 py-3 font-bold ${r.found ? 'text-emerald-600' : 'text-gray-300'}">${r.room ? r.room + ' 班' : '—'}</td>
        <td class="px-4 py-3">
          <span class="badge ${r.found ? 'found' : 'not-found'}">${r.found ? '✓ 找到' : '⚠ 查無'}</span>
        </td>
      </tr>
    `).join('');
    document.getElementById('list-view').classList.remove('hidden');
  }

  function renderGroups(results) {
    const found = results.filter(r => r.found && !r.special);
    const special = results.filter(r => r.special);
    const notFound = results.filter(r => !r.found && !r.special);

    // 按充電車分組
    const groups = {};
    for (const r of found) {
      const key = r.cart;
      if (!groups[key]) groups[key] = { cart: r.cart, room: r.room, items: [] };
      groups[key].items.push(r);
    }

    const sortedGroups = Object.values(groups).sort((a, b) => {
      const na = parseInt(a.cart.replace(/[^0-9]/g, '')) || 0;
      const nb = parseInt(b.cart.replace(/[^0-9]/g, '')) || 0;
      return na - nb;
    });

    let html = sortedGroups.map(g => `
      <div class="cart-group bg-white rounded-xl shadow p-4">
        <div class="flex justify-between items-center mb-3">
          <h3 class="font-bold text-indigo-600 text-lg">${g.cart}</h3>
          <span class="badge found">${g.room} 班</span>
        </div>
        <p class="text-xs text-gray-400 mb-2">${g.items.length} 台未使用</p>
        <div class="space-y-1">
          ${g.items.map(r => `
            <div class="flex justify-between text-sm">
              <span class="font-mono text-gray-700">${r.name}</span>
              <span class="text-xs text-gray-400">${r.syncTime}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('');

    if (special.length) {
      html += `
        <div class="cart-group bg-amber-50 border border-amber-200 rounded-xl p-4">
          <h3 class="font-bold text-amber-600 mb-2">🏫 漁光分校（${special.length} 台）</h3>
          <p class="text-xs text-gray-500 mb-2">屬漁光分校設備，不在充電車系統內</p>
          ${special.map(r => `
            <div class="text-sm font-mono text-amber-700">${r.name}</div>
          `).join('')}
        </div>
      `;
    }

    if (notFound.length) {
      html += `
        <div class="cart-group bg-red-50 border border-red-200 rounded-xl p-4">
          <h3 class="font-bold text-red-500 mb-2">⚠ 查無紀錄（${notFound.length} 台）</h3>
          <p class="text-xs text-gray-500 mb-2">可能為資料未同步，或新增設備尚未登錄</p>
          ${notFound.map(r => `
            <div class="text-sm font-mono text-red-700">${r.name}</div>
          `).join('')}
        </div>
      `;
    }

    document.getElementById('group-content').innerHTML = html;
  }

  function toggleView() {
    const isGroup = document.getElementById('toggle-view').checked;
    document.getElementById('list-view').classList.toggle('hidden', isGroup);
    document.getElementById('group-view').classList.toggle('hidden', !isGroup);
  }

  function copyResult() {
    if (!lastResults.length) return;
    const lines = lastResults.map(r =>
      `${r.name}\t${r.syncTime}\t${r.cart || '查無'}\t${r.room ? r.room+'班' : '查無'}`
    );
    navigator.clipboard.writeText(lines.join('\n'));
    alert('已複製到剪貼板！');
  }

  function clearAll() {
    document.getElementById('mdm-input').value = '';
    document.getElementById('stats').classList.add('hidden');
    document.getElementById('list-view').classList.add('hidden');
    document.getElementById('group-view').classList.add('hidden');
    lastResults = [];
  }
  </script>

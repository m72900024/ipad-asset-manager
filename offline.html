<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>億載國小 iPad 資產管理（離線版）</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Sans TC', sans-serif; }
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    .glass-card { background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
    .tab-btn { transition: all 0.3s; border-bottom: 3px solid transparent; }
    .tab-btn.active { border-bottom-color: #6366f1; color: #6366f1; font-weight: 700; }
    .cart-card { transition: all 0.3s; cursor: pointer; }
    .cart-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.15); }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 50; display: flex; align-items: center; justify-content: center; }
    .modal-content { background: white; border-radius: 16px; padding: 2rem; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; animation: fadeIn 0.3s ease; }
    .system-msg { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 100; padding: 12px 24px; border-radius: 12px; font-weight: 600; animation: fadeIn 0.3s ease; }
    .ipad-num { display: inline-block; padding: 2px 8px; margin: 2px; border-radius: 6px; font-family: monospace; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .ipad-num:hover { transform: scale(1.1); }
    .ipad-num.normal { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .ipad-num.moved { background: #fef9c3; color: #854d0e; border: 1px solid #fde047; }
    .ipad-num.loaned { background: #fce7f3; color: #9d174d; border: 1px solid #f9a8d4; }
    .log-row { border-bottom: 1px solid #f3f4f6; transition: background 0.2s; }
    .log-row:hover { background: #f9fafb; }
  </style>
</head>
<body class="p-4 md:p-8">
  <!-- System Message -->
  <div id="system-msg" class="system-msg hidden"></div>

  <!-- Main Container -->
  <div class="max-w-6xl mx-auto">
    <!-- Header -->
    <div class="text-center mb-6">
      <h1 class="text-3xl md:text-4xl font-extrabold text-white mb-2">📱 億載國小 iPad 資產管理</h1>
      <div class="flex items-center justify-center gap-3">
        <span class="bg-amber-400 text-amber-900 px-3 py-1 rounded-full text-sm font-bold">💾 離線模式</span>
        <span id="total-count" class="bg-white/20 text-white px-3 py-1 rounded-full text-sm font-semibold"></span>
      </div>
    </div>

    <!-- Tabs -->
    <div class="glass-card mb-4 px-2 py-1 flex overflow-x-auto gap-1">
      <button class="tab-btn active px-4 py-3 text-sm font-semibold whitespace-nowrap" onclick="switchTab('dashboard')">📊 分佈概覽</button>
      <button class="tab-btn px-4 py-3 text-sm font-semibold whitespace-nowrap" onclick="switchTab('carts')">🚚 充電車管理</button>
      <button class="tab-btn px-4 py-3 text-sm font-semibold whitespace-nowrap" onclick="switchTab('edit')">✏️ 數據編輯</button>
      <button class="tab-btn px-4 py-3 text-sm font-semibold whitespace-nowrap" onclick="switchTab('logs')">📋 操作紀錄</button>
      <button class="tab-btn px-4 py-3 text-sm font-semibold whitespace-nowrap" onclick="switchTab('mdm')">🔍 MDM 查詢</button>
    </div>

    <!-- ==================== TAB: Dashboard ==================== -->
    <div id="tab-dashboard" class="tab-content fade-in">
      <div class="glass-card p-6">
        <div class="flex flex-wrap justify-between items-center mb-4">
          <h2 class="text-xl font-bold text-gray-800">📊 充電車分佈概覽</h2>
          <div class="flex gap-2 mt-2 md:mt-0">
            <button onclick="returnAllToCreative()" class="bg-purple-500 hover:bg-purple-600 text-white px-3 py-1.5 rounded-lg text-sm font-semibold transition">🏠 全部歸回創意教室</button>
            <button onclick="openAddModal()" class="bg-green-500 hover:bg-green-600 text-white px-3 py-1.5 rounded-lg text-sm font-semibold transition">➕ 新增設備</button>
          </div>
        </div>
        <!-- Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
          <div class="bg-indigo-50 rounded-xl p-4 text-center">
            <div class="text-2xl font-extrabold text-indigo-600" id="stat-total">0</div>
            <div class="text-xs text-indigo-400 font-semibold">總設備數</div>
          </div>
          <div class="bg-emerald-50 rounded-xl p-4 text-center">
            <div class="text-2xl font-extrabold text-emerald-600" id="stat-carts">0</div>
            <div class="text-xs text-emerald-400 font-semibold">充電車數</div>
          </div>
          <div class="bg-amber-50 rounded-xl p-4 text-center">
            <div class="text-2xl font-extrabold text-amber-600" id="stat-moved">0</div>
            <div class="text-xs text-amber-400 font-semibold">已搬移</div>
          </div>
          <div class="bg-pink-50 rounded-xl p-4 text-center">
            <div class="text-2xl font-extrabold text-pink-600" id="stat-loaned">0</div>
            <div class="text-xs text-pink-400 font-semibold">外借中</div>
          </div>
        </div>
        <!-- Cart Grid -->
        <div id="cart-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
      </div>
    </div>

    <!-- ==================== TAB: Carts ==================== -->
    <div id="tab-carts" class="tab-content hidden fade-in">
      <div class="glass-card p-6">
        <h2 class="text-xl font-bold text-gray-800 mb-4">🚚 充電車管理</h2>
        <div class="mb-4">
          <select id="cart-select" onchange="renderCartDetail()" class="border-2 border-indigo-200 rounded-xl px-4 py-2 font-semibold focus:border-indigo-500 outline-none">
            <option value="">選擇充電車...</option>
          </select>
        </div>
        <div id="cart-detail"></div>
      </div>
    </div>

    <!-- ==================== TAB: Edit ==================== -->
    <div id="tab-edit" class="tab-content hidden fade-in">
      <div class="glass-card p-6">
        <div class="flex flex-wrap justify-between items-center mb-4">
          <h2 class="text-xl font-bold text-gray-800">✏️ 數據編輯</h2>
          <div class="flex gap-2 flex-wrap">
            <button onclick="exportCSV()" class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1.5 rounded-lg text-sm font-semibold transition">📥 匯出 CSV</button>
            <button onclick="document.getElementById('csv-upload').click()" class="bg-orange-500 hover:bg-orange-600 text-white px-3 py-1.5 rounded-lg text-sm font-semibold transition">📤 匯入 CSV</button>
            <input type="file" id="csv-upload" accept=".csv" class="hidden" onchange="importCSV(event)">
            <button onclick="resetToBuiltin()" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1.5 rounded-lg text-sm font-semibold transition">🔄 重置為內建</button>
          </div>
        </div>
        <div class="mb-3">
          <input id="edit-search" type="text" placeholder="🔍 搜尋設備編號、位置、外借..." oninput="renderEditTable()" class="w-full border-2 border-gray-200 rounded-xl px-4 py-2 focus:border-indigo-500 outline-none">
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="bg-gray-50 text-gray-600">
                <th class="px-3 py-2 text-left">#</th>
                <th class="px-3 py-2 text-left">設備編號</th>
                <th class="px-3 py-2 text-left">所屬充電車</th>
                <th class="px-3 py-2 text-left">目前位置</th>
                <th class="px-3 py-2 text-left">教室</th>
                <th class="px-3 py-2 text-left">外借</th>
                <th class="px-3 py-2 text-left">操作</th>
              </tr>
            </thead>
            <tbody id="edit-table"></tbody>
          </table>
        </div>
        <div id="edit-pagination" class="mt-3 flex justify-center gap-2"></div>
      </div>
    </div>

    <!-- ==================== TAB: Logs ==================== -->
    <div id="tab-logs" class="tab-content hidden fade-in">
      <div class="glass-card p-6">
        <div class="flex flex-wrap justify-between items-center mb-4">
          <h2 class="text-xl font-bold text-gray-800">📋 操作紀錄</h2>
          <div class="flex gap-2">
            <button onclick="clearLogs()" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1.5 rounded-lg text-sm font-semibold transition">🗑️ 清除紀錄</button>
            <button onclick="exportLogs()" class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1.5 rounded-lg text-sm font-semibold transition">📥 匯出紀錄</button>
          </div>
        </div>
        <div class="mb-3">
          <input id="log-search" type="text" placeholder="🔍 搜尋紀錄..." oninput="renderLogs()" class="w-full border-2 border-gray-200 rounded-xl px-4 py-2 focus:border-indigo-500 outline-none">
        </div>
        <div id="log-list" class="space-y-1"></div>
        <div id="log-empty" class="text-center text-gray-400 py-8 hidden">📭 尚無操作紀錄</div>
      </div>
    </div>

    <!-- ==================== TAB: MDM ==================== -->
    <div id="tab-mdm" class="tab-content hidden fade-in">
      <div class="glass-card p-6">
        <h2 class="text-xl font-bold text-gray-800 mb-4">🔍 MDM 未使用載具查詢</h2>
        <p class="text-gray-500 text-sm mb-3">從 MDM 系統複製「未使用載具名稱」清單貼上，比對本地 iPad 資料庫</p>
        <textarea id="mdm-input" rows="6" placeholder="貼上 MDM 清單...&#10;例如：&#10;YZES_IPAD9_001&#10;YZES_IPAD9_002" class="w-full border-2 border-gray-200 rounded-xl px-4 py-3 font-mono text-sm focus:border-indigo-500 outline-none mb-3"></textarea>
        <div class="flex gap-2 mb-4">
          <button onclick="doMdmLookup()" class="bg-indigo-500 hover:bg-indigo-600 text-white px-4 py-2 rounded-lg font-semibold transition">🔍 查詢比對</button>
          <button onclick="mdmCopyResult()" class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded-lg font-semibold transition">📋 複製結果</button>
        </div>
        <!-- Stats -->
        <div id="mdm-stats" class="hidden grid grid-cols-3 gap-3 mb-4">
          <div class="bg-blue-50 rounded-xl p-3 text-center">
            <div class="text-xl font-extrabold text-blue-600" id="mdm-stat-total">0</div>
            <div class="text-xs text-blue-400 font-semibold">總筆數</div>
          </div>
          <div class="bg-green-50 rounded-xl p-3 text-center">
            <div class="text-xl font-extrabold text-green-600" id="mdm-stat-found">0</div>
            <div class="text-xs text-green-400 font-semibold">已找到</div>
          </div>
          <div class="bg-red-50 rounded-xl p-3 text-center">
            <div class="text-xl font-extrabold text-red-600" id="mdm-stat-none">0</div>
            <div class="text-xs text-red-400 font-semibold">查無</div>
          </div>
        </div>
        <!-- Toggle -->
        <div id="mdm-result-wrap" class="hidden">
          <div class="flex items-center gap-3 mb-3">
            <span id="mdm-result-label" class="text-sm text-gray-500 font-semibold"></span>
            <label class="flex items-center gap-1 text-sm cursor-pointer">
              <input type="checkbox" id="mdm-toggle-group" onchange="mdmToggleView()"> 分車顯示
            </label>
          </div>
          <!-- List view -->
          <div id="mdm-list-view" class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead>
                <tr class="bg-gray-50 text-gray-600">
                  <th class="px-3 py-2">#</th>
                  <th class="px-3 py-2 text-left">名稱</th>
                  <th class="px-3 py-2 text-left">同步時間</th>
                  <th class="px-3 py-2 text-left">充電車</th>
                  <th class="px-3 py-2 text-left">位置</th>
                  <th class="px-3 py-2">狀態</th>
                </tr>
              </thead>
              <tbody id="mdm-result-table"></tbody>
            </table>
          </div>
          <!-- Group view -->
          <div id="mdm-group-view" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ==================== Add Device Modal ==================== -->
  <div id="add-modal" class="modal-overlay hidden" onclick="if(event.target===this)closeAddModal()">
    <div class="modal-content">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-bold text-gray-800">➕ 新增設備</h3>
        <button onclick="closeAddModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
      </div>
      <!-- Tabs -->
      <div class="flex gap-2 mb-4">
        <button id="add-tab-single" class="px-4 py-2 rounded-lg text-sm font-semibold bg-indigo-500 text-white" onclick="switchAddTab('single')">單一新增</button>
        <button id="add-tab-batch" class="px-4 py-2 rounded-lg text-sm font-semibold bg-gray-200 text-gray-600" onclick="switchAddTab('batch')">批次新增</button>
      </div>
      <!-- Single -->
      <div id="add-single" class="space-y-3">
        <div>
          <label class="text-sm font-semibold text-gray-600">設備編號</label>
          <input id="add-id" type="text" placeholder="例：YZES_IPAD10_484" class="w-full border-2 border-gray-200 rounded-lg px-3 py-2 mt-1 focus:border-indigo-500 outline-none">
        </div>
        <div>
          <label class="text-sm font-semibold text-gray-600">所屬充電車</label>
          <input id="add-cart" type="text" placeholder="例：充電車18" class="w-full border-2 border-gray-200 rounded-lg px-3 py-2 mt-1 focus:border-indigo-500 outline-none">
        </div>
        <div>
          <label class="text-sm font-semibold text-gray-600">目前位置</label>
          <input id="add-location" type="text" placeholder="例：充電車18" class="w-full border-2 border-gray-200 rounded-lg px-3 py-2 mt-1 focus:border-indigo-500 outline-none">
        </div>
        <div>
          <label class="text-sm font-semibold text-gray-600">教室</label>
          <input id="add-room" type="text" placeholder="例：505" class="w-full border-2 border-gray-200 rounded-lg px-3 py-2 mt-1 focus:border-indigo-500 outline-none">
        </div>
        <button onclick="addSingleDevice()" class="w-full bg-green-500 hover:bg-green-600 text-white py-2 rounded-lg font-semibold transition">✅ 新增</button>
      </div>
      <!-- Batch -->
      <div id="add-batch" class="hidden space-y-3">
        <p class="text-sm text-gray-500">格式：每行一台，<code>編號,充電車,位置,教室</code></p>
        <textarea id="add-batch-text" rows="6" placeholder="YZES_IPAD10_484,充電車18,充電車18,505&#10;YZES_IPAD10_485,充電車18,充電車18,505" class="w-full border-2 border-gray-200 rounded-lg px-3 py-2 font-mono text-sm focus:border-indigo-500 outline-none"></textarea>
        <div id="batch-preview"></div>
        <div class="flex gap-2">
          <button onclick="previewBatch()" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white py-2 rounded-lg font-semibold transition">👁️ 預覽</button>
          <button onclick="addBatchDevices()" class="flex-1 bg-green-500 hover:bg-green-600 text-white py-2 rounded-lg font-semibold transition">✅ 批次新增</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ==================== Loan Modal ==================== -->
  <div id="loan-modal" class="modal-overlay hidden" onclick="if(event.target===this)closeLoanModal()">
    <div class="modal-content" style="max-width:400px">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-bold text-gray-800">🏷️ 外借設備</h3>
        <button onclick="closeLoanModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
      </div>
      <p class="text-sm text-gray-500 mb-2">設備：<strong id="loan-device-id"></strong></p>
      <div class="space-y-3">
        <div>
          <label class="text-sm font-semibold text-gray-600">借用人 / 班級</label>
          <input id="loan-to" type="text" placeholder="例：王老師 / 三年一班" class="w-full border-2 border-gray-200 rounded-lg px-3 py-2 mt-1 focus:border-indigo-500 outline-none">
        </div>
        <button onclick="confirmLoan()" class="w-full bg-amber-500 hover:bg-amber-600 text-white py-2 rounded-lg font-semibold transition">✅ 確認外借</button>
      </div>
    </div>
  </div>

  <!-- ==================== Move Modal ==================== -->
  <div id="move-modal" class="modal-overlay hidden" onclick="if(event.target===this)closeMoveModal()">
    <div class="modal-content" style="max-width:450px">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-bold text-gray-800">📦 搬移設備</h3>
        <button onclick="closeMoveModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
      </div>
      <p class="text-sm text-gray-500 mb-2">設備：<strong id="move-device-id"></strong></p>
      <div class="space-y-3">
        <div>
          <label class="text-sm font-semibold text-gray-600">目標位置</label>
          <input id="move-location" type="text" placeholder="例：充電車5 或 創意教室" class="w-full border-2 border-gray-200 rounded-lg px-3 py-2 mt-1 focus:border-indigo-500 outline-none">
        </div>
        <div>
          <label class="text-sm font-semibold text-gray-600">教室（選填）</label>
          <input id="move-room" type="text" placeholder="例：501" class="w-full border-2 border-gray-200 rounded-lg px-3 py-2 mt-1 focus:border-indigo-500 outline-none">
        </div>
        <button onclick="confirmMove()" class="w-full bg-blue-500 hover:bg-blue-600 text-white py-2 rounded-lg font-semibold transition">✅ 確認搬移</button>
      </div>
    </div>
  </div>

    // ===== Storage Keys =====
    const DATA_KEY = 'ipad-asset-offline-data';
    const LOGS_KEY = 'ipad-asset-offline-logs';

    // ===== State =====
    let allIpads = [];
    let ipadsMap = {};
    let logs = [];
    let editPage = 1;
    const EDIT_PAGE_SIZE = 50;
    let currentLoanId = '';
    let currentMoveId = '';

    // ===== Init =====
    function init() {
      loadData();
      loadLogs();
      renderAll();
    }

    function loadData() {
      const saved = localStorage.getItem(DATA_KEY);
      if (saved) {
        try {
          allIpads = JSON.parse(saved);
        } catch(e) {
          allIpads = parseBuiltinCSV();
        }
      } else {
        allIpads = parseBuiltinCSV();
      }
      rebuildMap();
    }

    function parseBuiltinCSV() {
      return BUILTIN_CSV.trim().split('\n').map(line => {
        const [id, assignedCart, currentLocation, room] = line.split(',').map(s => s.trim());
        return { id, assignedCart, currentLocation, room: room || '', loanedTo: '', loanedSince: '' };
      }).filter(x => x.id);
    }

    function rebuildMap() {
      ipadsMap = {};
      allIpads.forEach(d => { ipadsMap[d.id.toUpperCase()] = d; });
    }

    function saveData() {
      localStorage.setItem(DATA_KEY, JSON.stringify(allIpads));
    }

    function loadLogs() {
      const saved = localStorage.getItem(LOGS_KEY);
      if (saved) {
        try { logs = JSON.parse(saved); } catch(e) { logs = []; }
      }
    }

    function saveLogs() {
      localStorage.setItem(LOGS_KEY, JSON.stringify(logs));
    }

    function addLog(action, deviceId, detail) {
      const entry = {
        time: new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' }),
        action, deviceId, detail
      };
      logs.unshift(entry);
      if (logs.length > 500) logs = logs.slice(0, 500);
      saveLogs();
    }

    // ===== Render =====
    function renderAll() {
      renderDashboard();
      renderCartSelect();
      renderEditTable();
      renderLogs();
      document.getElementById('total-count').textContent = allIpads.length + ' 台 iPad';
    }

    function renderDashboard() {
      const carts = {};
      let movedCount = 0, loanedCount = 0;
      allIpads.forEach(d => {
        const cart = d.assignedCart || '未分配';
        if (!carts[cart]) carts[cart] = { name: cart, items: [], rooms: new Set() };
        carts[cart].items.push(d);
        if (d.room) carts[cart].rooms.add(d.room);
        if (d.currentLocation !== d.assignedCart) movedCount++;
        if (d.loanedTo) loanedCount++;
      });

      const cartNames = Object.keys(carts).sort((a, b) => {
        const na = parseInt(a.replace(/[^0-9]/g, '')) || 999;
        const nb = parseInt(b.replace(/[^0-9]/g, '')) || 999;
        return na - nb;
      });

      document.getElementById('stat-total').textContent = allIpads.length;
      document.getElementById('stat-carts').textContent = cartNames.length;
      document.getElementById('stat-moved').textContent = movedCount;
      document.getElementById('stat-loaned').textContent = loanedCount;

      const grid = document.getElementById('cart-grid');
      grid.innerHTML = cartNames.map(name => {
        const c = carts[name];
        const moved = c.items.filter(d => d.currentLocation !== d.assignedCart).length;
        const loaned = c.items.filter(d => d.loanedTo).length;
        const rooms = [...c.rooms].join(', ');
        const borderColor = loaned > 0 ? 'border-pink-300' : moved > 0 ? 'border-amber-300' : 'border-indigo-200';

        return `
        <div class="cart-card bg-white rounded-xl p-4 border-2 ${borderColor}" onclick="switchTab('carts'); document.getElementById('cart-select').value='${name}'; renderCartDetail();">
          <div class="flex justify-between items-center mb-2">
            <span class="font-extrabold text-indigo-700 text-lg">🚚 ${name}</span>
            <span class="bg-indigo-100 text-indigo-600 px-2 py-0.5 rounded-full text-xs font-bold">${c.items.length} 台</span>
          </div>
          <div class="text-sm text-gray-500 mb-2">📍 ${rooms || '—'}</div>
          <div class="flex gap-2 flex-wrap">
            ${moved > 0 ? '<span class="bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full text-xs font-bold">📦 ' + moved + ' 台已搬移</span>' : ''}
            ${loaned > 0 ? '<span class="bg-pink-100 text-pink-700 px-2 py-0.5 rounded-full text-xs font-bold">🏷️ ' + loaned + ' 台外借</span>' : ''}
            ${moved === 0 && loaned === 0 ? '<span class="bg-green-100 text-green-700 px-2 py-0.5 rounded-full text-xs font-bold">✅ 全部在位</span>' : ''}
          </div>
        </div>`;
      }).join('');
    }

    function renderCartSelect() {
      const cartNames = [...new Set(allIpads.map(d => d.assignedCart))].sort((a, b) => {
        const na = parseInt(a.replace(/[^0-9]/g, '')) || 999;
        const nb = parseInt(b.replace(/[^0-9]/g, '')) || 999;
        return na - nb;
      });
      const sel = document.getElementById('cart-select');
      sel.innerHTML = '<option value="">選擇充電車...</option>' + cartNames.map(n => `<option value="${n}">${n}</option>`).join('');
    }

    function renderCartDetail() {
      const name = document.getElementById('cart-select').value;
      const container = document.getElementById('cart-detail');
      if (!name) { container.innerHTML = ''; return; }

      const items = allIpads.filter(d => d.assignedCart === name);
      const rooms = [...new Set(items.map(d => d.room).filter(Boolean))];

      container.innerHTML = `
        <div class="mb-4">
          <div class="flex justify-between items-center mb-3">
            <div>
              <span class="text-lg font-bold text-indigo-700">🚚 ${name}</span>
              <span class="ml-2 text-sm text-gray-500">${items.length} 台 | 📍 ${rooms.join(', ') || '—'}</span>
            </div>
            <button onclick="moveWholeCart('${name}')" class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1.5 rounded-lg text-sm font-semibold transition">📦 整車搬移</button>
          </div>
          <div class="flex flex-wrap gap-1">
            ${items.map(d => {
              const num = d.id.match(/\d+$/)?.[0] || d.id;
              const cls = d.loanedTo ? 'loaned' : d.currentLocation !== d.assignedCart ? 'moved' : 'normal';
              const title = d.loanedTo ? d.id + ' — 外借：' + d.loanedTo : d.id + ' — ' + d.currentLocation;
              return '<span class="ipad-num ' + cls + '" title="' + title + '" onclick="showDeviceActions(\'' + d.id + '\')">' + num + (d.loanedTo ? ' 🏷️' : '') + '</span>';
            }).join('')}
          </div>
          <div class="mt-3 flex gap-2 text-xs">
            <span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-green-200 border border-green-400 inline-block"></span> 在位</span>
            <span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-yellow-200 border border-yellow-400 inline-block"></span> 已搬移</span>
            <span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-pink-200 border border-pink-400 inline-block"></span> 外借中</span>
          </div>
        </div>`;
    }

    function renderEditTable() {
      const search = (document.getElementById('edit-search')?.value || '').toLowerCase();
      let filtered = allIpads;
      if (search) {
        filtered = allIpads.filter(d =>
          d.id.toLowerCase().includes(search) ||
          d.assignedCart.toLowerCase().includes(search) ||
          d.currentLocation.toLowerCase().includes(search) ||
          (d.room || '').toLowerCase().includes(search) ||
          (d.loanedTo || '').toLowerCase().includes(search)
        );
      }

      const totalPages = Math.ceil(filtered.length / EDIT_PAGE_SIZE) || 1;
      if (editPage > totalPages) editPage = totalPages;
      const start = (editPage - 1) * EDIT_PAGE_SIZE;
      const page = filtered.slice(start, start + EDIT_PAGE_SIZE);

      document.getElementById('edit-table').innerHTML = page.map((d, i) => {
        const isMoved = d.currentLocation !== d.assignedCart;
        const isLoaned = !!d.loanedTo;
        const rowBg = isLoaned ? 'bg-pink-50' : isMoved ? 'bg-amber-50' : '';
        return `
        <tr class="${rowBg} border-b border-gray-100 hover:bg-gray-50">
          <td class="px-3 py-2 text-gray-400">${start + i + 1}</td>
          <td class="px-3 py-2 font-mono font-semibold text-gray-800">${d.id}</td>
          <td class="px-3 py-2 text-indigo-600 font-semibold">${d.assignedCart}</td>
          <td class="px-3 py-2 ${isMoved ? 'text-amber-600 font-bold' : 'text-gray-600'}">${d.currentLocation}</td>
          <td class="px-3 py-2 text-gray-600">${d.room || '—'}</td>
          <td class="px-3 py-2">${isLoaned ? '<span class="bg-pink-100 text-pink-700 px-2 py-0.5 rounded-full text-xs font-bold">🏷️ ' + d.loanedTo + '</span>' : '—'}</td>
          <td class="px-3 py-2">
            <div class="flex gap-1 flex-wrap">
              <button onclick="openMoveModal('${d.id}')" class="bg-blue-100 hover:bg-blue-200 text-blue-700 px-2 py-1 rounded text-xs font-semibold">📦</button>
              ${isLoaned
                ? '<button onclick="returnDevice(\'' + d.id + '\')" class="bg-green-100 hover:bg-green-200 text-green-700 px-2 py-1 rounded text-xs font-semibold">↩️</button>'
                : '<button onclick="openLoanModal(\'' + d.id + '\')" class="bg-amber-100 hover:bg-amber-200 text-amber-700 px-2 py-1 rounded text-xs font-semibold">🏷️</button>'}
              <button onclick="renameDevice('${d.id}')" class="bg-purple-100 hover:bg-purple-200 text-purple-700 px-2 py-1 rounded text-xs font-semibold">✏️</button>
              <button onclick="deleteDevice('${d.id}')" class="bg-red-100 hover:bg-red-200 text-red-700 px-2 py-1 rounded text-xs font-semibold">🗑️</button>
            </div>
          </td>
        </tr>`;
      }).join('');

      // Pagination
      const pag = document.getElementById('edit-pagination');
      if (totalPages <= 1) { pag.innerHTML = ''; return; }
      let btns = '';
      for (let p = 1; p <= totalPages; p++) {
        btns += `<button onclick="editPage=${p};renderEditTable()" class="px-3 py-1 rounded-lg text-sm font-semibold ${p === editPage ? 'bg-indigo-500 text-white' : 'bg-gray-200 text-gray-600 hover:bg-gray-300'}">${p}</button>`;
      }
      pag.innerHTML = btns;
    }

    function renderLogs() {
      const search = (document.getElementById('log-search')?.value || '').toLowerCase();
      let filtered = logs;
      if (search) {
        filtered = logs.filter(l =>
          l.action.toLowerCase().includes(search) ||
          l.deviceId.toLowerCase().includes(search) ||
          l.detail.toLowerCase().includes(search)
        );
      }

      if (!filtered.length) {
        document.getElementById('log-list').innerHTML = '';
        document.getElementById('log-empty').classList.remove('hidden');
        return;
      }
      document.getElementById('log-empty').classList.add('hidden');

      const actionColors = {
        '搬移': 'bg-blue-100 text-blue-700',
        '外借': 'bg-amber-100 text-amber-700',
        '歸還': 'bg-green-100 text-green-700',
        '新增': 'bg-emerald-100 text-emerald-700',
        '刪除': 'bg-red-100 text-red-700',
        '修改編號': 'bg-purple-100 text-purple-700',
        '匯入': 'bg-orange-100 text-orange-700',
        '重置': 'bg-gray-100 text-gray-700',
        '全部歸回': 'bg-violet-100 text-violet-700',
        '整車搬移': 'bg-cyan-100 text-cyan-700',
      };

      document.getElementById('log-list').innerHTML = filtered.slice(0, 200).map(l => {
        const color = actionColors[l.action] || 'bg-gray-100 text-gray-700';
        return `
        <div class="log-row flex items-center gap-3 px-3 py-2 text-sm">
          <span class="text-gray-400 text-xs whitespace-nowrap">${l.time}</span>
          <span class="${color} px-2 py-0.5 rounded-full text-xs font-bold whitespace-nowrap">${l.action}</span>
          <span class="font-mono font-semibold text-gray-700">${l.deviceId}</span>
          <span class="text-gray-500 truncate">${l.detail}</span>
        </div>`;
      }).join('');
    }

    // ===== Tabs =====
    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.remove('hidden');
      const tabs = ['dashboard', 'carts', 'edit', 'logs', 'mdm'];
      const btns = document.querySelectorAll('.tab-btn');
      btns[tabs.indexOf(tab)]?.classList.add('active');
    }

    // ===== Device Actions =====
    function showDeviceActions(id) {
      const d = ipadsMap[id.toUpperCase()];
      if (!d) return;
      const actions = d.loanedTo
        ? `外借給：${d.loanedTo}\n\n1. 歸還\n2. 搬移\n3. 修改編號\n4. 取消`
        : `位置：${d.currentLocation}\n教室：${d.room || '—'}\n\n1. 外借\n2. 搬移\n3. 修改編號\n4. 取消`;
      const choice = prompt(actions);
      if (choice === '1') {
        if (d.loanedTo) returnDevice(id);
        else openLoanModal(id);
      } else if (choice === '2') {
        openMoveModal(id);
      } else if (choice === '3') {
        renameDevice(id);
      }
    }

    // ===== Loan =====
    function openLoanModal(id) {
      currentLoanId = id;
      document.getElementById('loan-device-id').textContent = id;
      document.getElementById('loan-to').value = '';
      document.getElementById('loan-modal').classList.remove('hidden');
    }
    function closeLoanModal() {
      document.getElementById('loan-modal').classList.add('hidden');
    }
    function confirmLoan() {
      const to = document.getElementById('loan-to').value.trim();
      if (!to) { alert('請輸入借用人'); return; }
      const d = ipadsMap[currentLoanId.toUpperCase()];
      if (!d) return;
      d.loanedTo = to;
      d.loanedSince = new Date().toLocaleDateString('zh-TW');
      saveData();
      addLog('外借', d.id, `借給 ${to}`);
      closeLoanModal();
      renderAll();
      showSystemMessage('🏷️ 已外借：' + d.id + ' → ' + to, 'amber');
    }

    function returnDevice(id) {
      const d = ipadsMap[id.toUpperCase()];
      if (!d || !d.loanedTo) return;
      const who = d.loanedTo;
      if (!confirm(`確定歸還 ${id}？\n借用人：${who}`)) return;
      d.loanedTo = '';
      d.loanedSince = '';
      saveData();
      addLog('歸還', d.id, `${who} 歸還`);
      renderAll();
      showSystemMessage('✅ 已歸還：' + id, 'green');
    }

    function returnAllToCreative() {
      const loaned = allIpads.filter(d => d.loanedTo);
      const moved = allIpads.filter(d => d.currentLocation !== d.assignedCart);
      const total = loaned.length + moved.length;
      if (total === 0) { alert('所有設備都已在原位，無需歸回'); return; }
      if (!confirm(`確定全部歸回？\n\n• ${loaned.length} 台外借將歸還\n• ${moved.length} 台搬移將歸位\n\n共 ${total} 台受影響`)) return;

      allIpads.forEach(d => {
        if (d.loanedTo) { d.loanedTo = ''; d.loanedSince = ''; }
        if (d.currentLocation !== d.assignedCart) { d.currentLocation = d.assignedCart; }
      });
      saveData();
      addLog('全部歸回', '全部', `${loaned.length} 台歸還 + ${moved.length} 台歸位`);
      renderAll();
      showSystemMessage('🏠 全部已歸回！共 ' + total + ' 台', 'green');
    }

    // ===== Move =====
    function openMoveModal(id) {
      currentMoveId = id;
      const d = ipadsMap[id.toUpperCase()];
      document.getElementById('move-device-id').textContent = id;
      document.getElementById('move-location').value = d ? d.currentLocation : '';
      document.getElementById('move-room').value = d ? (d.room || '') : '';
      document.getElementById('move-modal').classList.remove('hidden');
    }
    function closeMoveModal() {
      document.getElementById('move-modal').classList.add('hidden');
    }
    function confirmMove() {
      const loc = document.getElementById('move-location').value.trim();
      const room = document.getElementById('move-room').value.trim();
      if (!loc) { alert('請輸入目標位置'); return; }
      const d = ipadsMap[currentMoveId.toUpperCase()];
      if (!d) return;
      const oldLoc = d.currentLocation;
      d.currentLocation = loc;
      d.room = room;
      saveData();
      addLog('搬移', d.id, `${oldLoc} → ${loc}` + (room ? ` (${room})` : ''));
      closeMoveModal();
      renderAll();
      showSystemMessage('📦 已搬移：' + d.id + ' → ' + loc, 'blue');
    }

    function moveWholeCart(cartName) {
      const newLoc = prompt(`整車搬移：${cartName}\n\n請輸入新位置：`, cartName);
      if (!newLoc || !newLoc.trim()) return;
      const newRoom = prompt('教室編號（選填）：', '');
      const items = allIpads.filter(d => d.assignedCart === cartName);
      if (!confirm(`確定將 ${cartName} 的 ${items.length} 台全部搬到 ${newLoc.trim()}？`)) return;

      items.forEach(d => {
        d.currentLocation = newLoc.trim();
        if (newRoom !== null) d.room = newRoom.trim();
      });
      saveData();
      addLog('整車搬移', cartName, `${items.length} 台 → ${newLoc.trim()}`);
      renderAll();
      renderCartDetail();
      showSystemMessage('📦 整車搬移完成：' + cartName + ' → ' + newLoc.trim(), 'blue');
    }

    // ===== Rename =====
    function renameDevice(oldId) {
      const newId = prompt('修改設備編號\n\n目前：' + oldId + '\n\n新編號：', oldId);
      if (!newId || newId.trim() === oldId) return;
      const trimId = newId.trim();
      if (ipadsMap[trimId.toUpperCase()] && trimId.toUpperCase() !== oldId.toUpperCase()) {
        alert('❌ 編號 ' + trimId + ' 已被使用！');
        return;
      }
      if (!confirm('確定將 ' + oldId + ' 改為 ' + trimId + '？')) return;

      const d = ipadsMap[oldId.toUpperCase()];
      if (!d) return;
      delete ipadsMap[oldId.toUpperCase()];
      d.id = trimId;
      ipadsMap[trimId.toUpperCase()] = d;
      saveData();
      addLog('修改編號', trimId, oldId + ' → ' + trimId);
      renderAll();
      showSystemMessage('✏️ 編號已修改：' + oldId + ' → ' + trimId, 'purple');
    }

    // ===== Delete =====
    function deleteDevice(id) {
      if (!confirm('確定刪除 ' + id + '？\n\n此操作無法復原！')) return;
      const idx = allIpads.findIndex(d => d.id === id);
      if (idx >= 0) allIpads.splice(idx, 1);
      delete ipadsMap[id.toUpperCase()];
      saveData();
      addLog('刪除', id, '設備已刪除');
      renderAll();
      showSystemMessage('🗑️ 已刪除：' + id, 'red');
    }

    // ===== Add Device =====
    function openAddModal() { document.getElementById('add-modal').classList.remove('hidden'); }
    function closeAddModal() { document.getElementById('add-modal').classList.add('hidden'); }

    function switchAddTab(tab) {
      document.getElementById('add-single').classList.toggle('hidden', tab !== 'single');
      document.getElementById('add-batch').classList.toggle('hidden', tab !== 'batch');
      document.getElementById('add-tab-single').className = tab === 'single' ? 'px-4 py-2 rounded-lg text-sm font-semibold bg-indigo-500 text-white' : 'px-4 py-2 rounded-lg text-sm font-semibold bg-gray-200 text-gray-600';
      document.getElementById('add-tab-batch').className = tab === 'batch' ? 'px-4 py-2 rounded-lg text-sm font-semibold bg-indigo-500 text-white' : 'px-4 py-2 rounded-lg text-sm font-semibold bg-gray-200 text-gray-600';
    }

    function addSingleDevice() {
      const id = document.getElementById('add-id').value.trim();
      const cart = document.getElementById('add-cart').value.trim();
      const loc = document.getElementById('add-location').value.trim();
      const room = document.getElementById('add-room').value.trim();
      if (!id || !cart) { alert('請填寫編號和充電車'); return; }
      if (ipadsMap[id.toUpperCase()]) { alert('❌ 編號已存在！'); return; }

      const d = { id, assignedCart: cart, currentLocation: loc || cart, room, loanedTo: '', loanedSince: '' };
      allIpads.push(d);
      ipadsMap[id.toUpperCase()] = d;
      saveData();
      addLog('新增', id, `${cart} / ${loc || cart}`);
      closeAddModal();
      renderAll();
      showSystemMessage('✅ 已新增：' + id, 'green');
      // Clear form
      ['add-id', 'add-cart', 'add-location', 'add-room'].forEach(x => document.getElementById(x).value = '');
    }

    function previewBatch() {
      const text = document.getElementById('add-batch-text').value.trim();
      if (!text) { alert('請輸入資料'); return; }
      const lines = text.split('\n').filter(l => l.trim());
      const items = lines.map(l => {
        const [id, cart, loc, room] = l.split(',').map(s => s.trim());
        const exists = ipadsMap[id?.toUpperCase()];
        return { id, cart, loc, room, exists: !!exists };
      });
      const valid = items.filter(x => x.id && !x.exists).length;
      const dup = items.filter(x => x.exists).length;
      document.getElementById('batch-preview').innerHTML = `
        <div class="bg-blue-50 rounded-lg p-3 text-sm">
          <span class="font-bold">預覽：</span> ${items.length} 筆資料，${valid} 筆可新增${dup > 0 ? '，<span class="text-red-600 font-bold">' + dup + ' 筆重複</span>' : ''}
        </div>`;
    }

    function addBatchDevices() {
      const text = document.getElementById('add-batch-text').value.trim();
      if (!text) { alert('請輸入資料'); return; }
      const lines = text.split('\n').filter(l => l.trim());
      let added = 0;
      lines.forEach(l => {
        const [id, cart, loc, room] = l.split(',').map(s => s.trim());
        if (!id || !cart || ipadsMap[id.toUpperCase()]) return;
        const d = { id, assignedCart: cart, currentLocation: loc || cart, room: room || '', loanedTo: '', loanedSince: '' };
        allIpads.push(d);
        ipadsMap[id.toUpperCase()] = d;
        added++;
      });
      if (added === 0) { alert('沒有可新增的資料（可能全部重複）'); return; }
      saveData();
      addLog('新增', `批次 ${added} 台`, `批次新增 ${added} 台設備`);
      closeAddModal();
      renderAll();
      showSystemMessage('✅ 批次新增 ' + added + ' 台設備', 'green');
      document.getElementById('add-batch-text').value = '';
      document.getElementById('batch-preview').innerHTML = '';
    }

    // ===== CSV Import/Export =====
    function exportCSV() {
      const header = 'id,assignedCart,currentLocation,room,loanedTo,loanedSince';
      const rows = allIpads.map(d => [d.id, d.assignedCart, d.currentLocation, d.room || '', d.loanedTo || '', d.loanedSince || ''].join(','));
      const csv = header + '\n' + rows.join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'ipad-asset-' + new Date().toISOString().slice(0, 10) + '.csv';
      a.click();
      addLog('匯出', '全部', allIpads.length + ' 筆');
      showSystemMessage('📥 已匯出 CSV', 'blue');
    }

    function importCSV(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        const lines = e.target.result.trim().split('\n');
        const hasHeader = lines[0].toLowerCase().includes('id');
        const dataLines = hasHeader ? lines.slice(1) : lines;
        const newData = dataLines.map(l => {
          const parts = l.split(',').map(s => s.trim());
          return {
            id: parts[0],
            assignedCart: parts[1] || '',
            currentLocation: parts[2] || parts[1] || '',
            room: parts[3] || '',
            loanedTo: parts[4] || '',
            loanedSince: parts[5] || ''
          };
        }).filter(d => d.id);

        if (!newData.length) { alert('CSV 無有效資料'); return; }
        if (!confirm('匯入 ' + newData.length + ' 筆資料？\n\n⚠️ 將取代現有所有資料！')) return;

        allIpads = newData;
        rebuildMap();
        saveData();
        addLog('匯入', '全部', newData.length + ' 筆');
        renderAll();
        showSystemMessage('📤 已匯入 ' + newData.length + ' 筆資料', 'green');
      };
      reader.readAsText(file);
      event.target.value = '';
    }

    function resetToBuiltin() {
      if (!confirm('確定重置為內建資料？\n\n⚠️ 所有修改將遺失！')) return;
      allIpads = parseBuiltinCSV();
      rebuildMap();
      saveData();
      addLog('重置', '全部', '重置為內建資料');
      renderAll();
      showSystemMessage('🔄 已重置為內建資料', 'blue');
    }

    // ===== Logs =====
    function clearLogs() {
      if (!confirm('確定清除所有操作紀錄？')) return;
      logs = [];
      saveLogs();
      renderLogs();
      showSystemMessage('🗑️ 紀錄已清除', 'red');
    }

    function exportLogs() {
      if (!logs.length) { alert('無紀錄可匯出'); return; }
      const header = '時間,操作,設備,詳情';
      const rows = logs.map(l => [l.time, l.action, l.deviceId, l.detail].join(','));
      const csv = header + '\n' + rows.join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });

    // ===== MDM =====
    let mdmLastResults = [];

    function mdmParse(raw) {
      return raw.trim().split('\n').map(l => l.trim()).filter(l => l && !l.includes('未使用載具名稱') && !l.includes('原生MDM')).map(l => {
        const parts = l.split(/\t|  +/);
        return { name: parts[0]?.trim(), syncTime: parts.slice(1).join(' ').trim() || '-' };
      }).filter(r => r.name);
    }

    function doMdmLookup() {
      const raw = document.getElementById('mdm-input').value;
      if (!raw.trim()) { alert('請先貼上 MDM 清單'); return; }
      const items = mdmParse(raw);
      if (!items.length) { alert('解析不到資料'); return; }

      mdmLastResults = items.map((item, i) => {
        function extractNum(s) {
          const m = s.match(/(\d+)$/);
          return m ? parseInt(m[1], 10) : null;
        }
        let rec = ipadsMap[item.name.toUpperCase()];
        if (!rec) {
          const inputNum = extractNum(item.name);
          if (inputNum !== null) {
            const found = Object.keys(ipadsMap).find(k => extractNum(k) === inputNum);
            if (found) rec = ipadsMap[found];
          }
        }
        if (rec) return { index: i+1, ...item, cart: rec.assignedCart, room: rec.room || rec.currentLocation, found: true, loanedTo: rec.loanedTo || '' };
        return { index: i+1, ...item, cart: null, room: null, found: false, loanedTo: '' };
      });

      const found = mdmLastResults.filter(r => r.found).length;
      document.getElementById('mdm-stat-total').textContent = mdmLastResults.length;
      document.getElementById('mdm-stat-found').textContent = found;
      document.getElementById('mdm-stat-none').textContent = mdmLastResults.length - found;
      document.getElementById('mdm-stats').classList.remove('hidden');
      document.getElementById('mdm-result-wrap').classList.remove('hidden');
      mdmRenderList();
      mdmRenderGroups();
      mdmToggleView();
    }

    function mdmRenderList() {
      document.getElementById('mdm-result-table').innerHTML = mdmLastResults.map(r => {
        const rowBg = r.loanedTo ? 'background:#fffbeb' : r.found ? '' : 'background:#fff5f5';
        const statusTag = r.loanedTo ? '🏷️ 外借' : r.found ? '✓ 找到' : '⚠ 查無';
        const statusStyle = r.loanedTo ? 'background:#fef9c3;color:#92400e' : r.found ? 'background:#ecfdf5;color:#059669' : 'background:#fef2f2;color:#ef4444';
        return `
        <tr style="${rowBg};border-bottom:1px solid #f3f4f6">
          <td class="px-3 py-2 text-gray-400">${r.index}</td>
          <td class="px-3 py-2 font-mono font-semibold text-gray-800">${r.name}</td>
          <td class="px-3 py-2 text-gray-500 text-xs">${r.syncTime}</td>
          <td class="px-3 py-2 font-bold ${r.found ? 'text-indigo-600' : 'text-gray-300'}">${r.cart || '—'}</td>
          <td class="px-3 py-2 ${r.found ? 'text-emerald-600' : 'text-gray-300'}">${r.room || '—'}${r.loanedTo ? ' <span class="text-xs bg-amber-100 text-amber-700 px-1 rounded">🏷️'+r.loanedTo+'</span>' : ''}</td>
          <td class="px-3 py-2"><span style="display:inline-block;padding:2px 8px;border-radius:9999px;font-size:0.75rem;font-weight:600;${statusStyle}">${statusTag}</span></td>
        </tr>`;
      }).join('');
    }

    function mdmShortNum(name) {
      const m = name.match(/(\d+)$/);
      return m ? m[1] : name;
    }

    function mdmRenderGroups() {
      const found = mdmLastResults.filter(r => r.found);
      const notFound = mdmLastResults.filter(r => !r.found);
      const groups = {};
      for (const r of found) {
        const key = r.cart || '未知';
        if (!groups[key]) groups[key] = { cart: r.cart, room: r.room, items: [] };
        groups[key].items.push(r);
      }
      const sorted = Object.values(groups).sort((a,b) => {
        const na = parseInt((a.cart||'').replace(/[^0-9]/g,''))||0;
        const nb = parseInt((b.cart||'').replace(/[^0-9]/g,''))||0;
        return na - nb;
      });

      let html = sorted.map(g => `
        <div style="background:white;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.08);padding:1rem">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.35rem">
            <span style="font-weight:800;color:#4f46e5;font-size:1.05rem">🚚 ${g.cart}</span>
            <span style="background:#ecfdf5;color:#059669;padding:2px 10px;border-radius:9999px;font-size:0.78rem;font-weight:700">${g.items.length} 台</span>
          </div>
          <div style="margin-bottom:0.5rem">
            <span style="background:#ede9fe;color:#6d28d9;padding:2px 10px;border-radius:9999px;font-size:0.78rem;font-weight:700">📍 ${g.room || '—'}</span>
          </div>
          <div style="line-height:2">
            ${g.items.map(r => `<span title="${r.name}" style="display:inline-block;background:#f3f4f6;border-radius:6px;padding:1px 8px;margin:2px;font-family:monospace;font-size:0.88rem;color:#374151;font-weight:600">${mdmShortNum(r.name)}</span>`).join('')}
          </div>
        </div>`).join('');

      if (notFound.length) html += `
        <div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:12px;padding:1rem">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.35rem">
            <span style="font-weight:800;color:#ef4444;font-size:1.05rem">⚠ 查無紀錄</span>
            <span style="background:#fee2e2;color:#ef4444;padding:2px 10px;border-radius:9999px;font-size:0.78rem;font-weight:700">${notFound.length} 台</span>
          </div>
          <div style="line-height:2">
            ${notFound.map(r => `<span title="${r.name}" style="display:inline-block;background:#fee2e2;border-radius:6px;padding:1px 8px;margin:2px;font-family:monospace;font-size:0.88rem;color:#dc2626;font-weight:600">${mdmShortNum(r.name)}</span>`).join('')}
          </div>
        </div>`;

      document.getElementById('mdm-group-view').innerHTML = html;
      document.getElementById('mdm-result-label').textContent = sorted.length + ' 輛充電車，共 ' + found.length + ' 台已找到';
    }

    function mdmToggleView() {
      const isGroup = document.getElementById('mdm-toggle-group').checked;
      document.getElementById('mdm-list-view').classList.toggle('hidden', isGroup);
      document.getElementById('mdm-group-view').classList.toggle('hidden', !isGroup);
    }

    function mdmCopyResult() {
      if (!mdmLastResults.length) return;
      navigator.clipboard.writeText(mdmLastResults.map(r => r.name + '\t' + r.syncTime + '\t' + (r.cart || '查無')).join('\n'));
      showSystemMessage('📋 已複製到剪貼簿', 'blue');
    }

    // ===== System Message =====
    function showSystemMessage(text, color) {
      const el = document.getElementById('system-msg');
      const colors = {
        green: 'background:#ecfdf5;color:#059669;border:1px solid #a7f3d0',
        red: 'background:#fef2f2;color:#ef4444;border:1px solid #fca5a5',
        blue: 'background:#eff6ff;color:#3b82f6;border:1px solid #93c5fd',
        amber: 'background:#fffbeb;color:#d97706;border:1px solid #fcd34d',
        purple: 'background:#faf5ff;color:#9333ea;border:1px solid #c4b5fd',
      };
      el.style.cssText = colors[color] || colors.blue;
      el.textContent = text;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 3000);
    }

    // ===== Start =====
    init();
  </script>
</body>
</html>
